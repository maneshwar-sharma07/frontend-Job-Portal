<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Seeker Signup - JobPortal Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <main class="auth-page">
        <div class="auth-card card">
            <h2>Job Seeker **Sign Up**</h2>
            <form id="signup-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary full-width">Create Account</button>
            </form>

            <p class="switch-link">
                Already have an account? <a href="user-login.html">Login Here</a>
            </p>
        </div>
    </main>

    <script>
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // FRONT-END SIMULATION: 
            alert('Job Seeker Sign Up successful! (Account created, please log in in a real app.)');
            // window.location.href = 'user-login.html';
        });
    </script>
</body>
</html>
