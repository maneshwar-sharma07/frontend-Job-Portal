<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Seeker Login - JobPortal Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <main class="auth-page">
        <div class="auth-card card">
            <h2>Job Seeker **Login**</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary full-width">Sign In</button>
            </form>

            <p class="switch-link">
                Don't have an account? <a href="user-signup.html">Sign Up Here</a>
            </p>
        </div>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // FRONT-END SIMULATION: 
            alert('Job Seeker Login Attempted. (Redirecting to Dashboard in a real app...)');
            // window.location.href = 'user-dashboard.html';
        });
    </script>
</body>
</html>
